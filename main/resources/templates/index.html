<!doctype html>
<html xmlns:th=""http://www.thymeleaf.org"">
<head>
  <meta charset=""utf-8""/>
  <meta name=""viewport"" content=""width=device-width, initial-scale=1""/>
  <title>电影院购票系统 - 主页面</title>
  <link href=""https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"" rel=""stylesheet""/>
</head>
<body class=""bg-light"">
<nav class=""navbar navbar-dark bg-primary mb-4"">
  <div class=""container"">
    <span class=""navbar-brand"">电影院购票系统</span>
    <form class=""d-flex"" method=""get"" th:action=""@{/}"">
      <input class=""form-control me-2"" name=""q"" th:value="""" placeholder=""搜索电影/演员"" />
      <button class=""btn btn-light"">搜索</button>
    </form>
  </div>
</nav>

<div class=""container"">
  <h3 class=""mb-3"">正在上映电影（共 <span th:text=""""/> 部）</h3>

  <div class=""row row-cols-1 row-cols-md-2 row-cols-lg-3 g-3"">
    <div class=""col"" th:each=""m : "">
      <div class=""card h-100"">
        <div class=""card-body"">
          <h5 class=""card-title"" th:text="""">电影名</h5>
          <h6 class=""card-subtitle text-muted"">时长：<span th:text=""""/> 分钟</h6>
          <p class=""mt-2"">演员：<span th:text=""""/></p>
          <p class=""text-muted"">评分：<span th:text=""""/></p>
          <a class=""btn btn-primary btn-sm"" th:href=""@{'/movie/' + }"">查看场次</a>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
